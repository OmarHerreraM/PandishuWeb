    <script>
        lucide.createIcons();

        // Extraer parÃ¡metros de la URL que Mercado Pago agrega al redirigir
        const params = new URLSearchParams(window.location.search);
        const paymentId = params.get('payment_id');
        const merchantOrderId = params.get('merchant_order_id');
        const status = params.get('status');

        if (paymentId) {
            document.getElementById('payment-id').textContent = '#' + paymentId;
            document.getElementById('merchant-order').textContent = merchantOrderId || 'â€”';
            document.getElementById('order-details').classList.remove('hidden');
        }

        // Extract cart to compute accurate total for GA4 before wiping
        let purchaseTotal = 0;
        let purchasedItems = [];
        try {
            const rawCart = localStorage.getItem('pandishu_cart');
            if (rawCart) {
                const parsedCart = JSON.parse(rawCart);
                parsedCart.forEach(item => {
                    const lineTotal = (parseFloat(item.price) || 0) * (parseInt(item.quantity) || 1);
                    purchaseTotal += lineTotal;
                    purchasedItems.push({
                        item_id: item.sku,
                        item_name: item.name,
                        item_brand: item.vendor,
                        price: item.price,
                        quantity: item.quantity
                    });
                });
            }
        } catch (e) { console.error('Error fetching cart for tracking', e); }

        // Limpiar carrito tras pago exitoso
        localStorage.removeItem('pandishu_cart');

        // GA4 purchase event via Safe Wrapper
        if (typeof window.pandishuTrack === 'function') {
            window.pandishuTrack('purchase', {
                transaction_id: paymentId || 'tx_' + Math.random().toString(36).substr(2, 9),
                value: purchaseTotal,
                currency: 'MXN',
                items: purchasedItems
            });
        }
    </script>
