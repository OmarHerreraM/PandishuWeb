<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pago Exitoso! | Pandishú</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0
            }

            70% {
                transform: scale(1.15)
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .pop {
            animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .fadeUp {
            animation: fadeUp 0.5s ease forwards;
        }

        .delay-1 {
            animation-delay: 0.3s;
            opacity: 0;
        }

        .delay-2 {
            animation-delay: 0.5s;
            opacity: 0;
        }

        .delay-3 {
            animation-delay: 0.7s;
            opacity: 0;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center px-6">

    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div
            class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-green-500/5 rounded-full blur-[120px]">
        </div>
    </div>

    <div class="relative text-center max-w-md mx-auto">

        <!-- Check Icon -->
        <div
            class="pop w-28 h-28 mx-auto mb-8 rounded-full bg-green-500/15 border-2 border-green-500/40 flex items-center justify-center shadow-2xl shadow-green-500/20">
            <i data-lucide="check" class="w-14 h-14 text-green-400"></i>
        </div>

        <h1 class="fadeUp delay-1 text-4xl font-black text-white mb-3">¡Pago Aprobado!</h1>
        <p class="fadeUp delay-1 text-slate-400 text-lg mb-2">Tu pedido ha sido confirmado.</p>
        <p class="fadeUp delay-1 text-slate-500 text-sm mb-8">Recibirás un correo de confirmación en breve con los
            detalles de tu pedido y guía de rastreo.</p>

        <!-- Order details from URL params -->
        <div id="order-details"
            class="fadeUp delay-2 bg-slate-800/60 border border-white/5 rounded-2xl p-5 mb-8 text-left hidden">
            <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-3">Detalles del pago</p>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between"><span class="text-slate-400">ID de Pago</span><span id="payment-id"
                        class="text-white font-mono font-bold"></span></div>
                <div class="flex justify-between"><span class="text-slate-400">Estado</span><span
                        class="text-green-400 font-bold">✓ Aprobado</span></div>
                <div class="flex justify-between"><span class="text-slate-400">Referencia</span><span
                        id="merchant-order" class="text-slate-300 font-mono text-xs"></span></div>
            </div>
        </div>

        <div class="fadeUp delay-3 flex flex-col sm:flex-row gap-3 justify-center">
            <a href="tienda.html"
                class="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-6 py-3 rounded-xl transition-all">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i> Seguir Comprando
            </a>
            <a href="https://wa.me/5216442041543?text=Hola!+Realicé+un+pedido+en+pandishu.com" target="_blank"
                class="flex items-center justify-center gap-2 bg-green-600 hover:bg-green-500 text-white font-bold px-6 py-3 rounded-xl transition-all">
                <i data-lucide="message-circle" class="w-4 h-4"></i> Contactar Soporte
            </a>
        </div>

        <p class="mt-8 text-slate-600 text-xs">
            <a href="index.html" class="hover:text-indigo-400 transition-colors">― Pandishú · Inicio ―</a>
        </p>
    </div>

    <script>
        lucide.createIcons();

        // Extraer parámetros de la URL que Mercado Pago agrega al redirigir
        const params = new URLSearchParams(window.location.search);
        const paymentId = params.get('payment_id');
        const merchantOrderId = params.get('merchant_order_id');
        const status = params.get('status');

        if (paymentId) {
            document.getElementById('payment-id').textContent = '#' + paymentId;
            document.getElementById('merchant-order').textContent = merchantOrderId || '—';
            document.getElementById('order-details').classList.remove('hidden');
        }

        // Limpiar carrito tras pago exitoso
        localStorage.removeItem('pandishu_cart');

        // GA4 purchase event
        if (typeof gtag !== 'undefined') {
            gtag('event', 'purchase', {
                transaction_id: paymentId || 'unknown',
                value: 0,
                currency: 'MXN',
            });
        }
    </script>
</body>

</html>
