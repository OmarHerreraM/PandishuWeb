<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Pedidos | Pandishú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
        }
    </style>
</head>

<body class="antialiased min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-4xl font-black uppercase italic">Dashboard de Pedidos</h1>
            <button
                class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-6 rounded-xl transition-all flex items-center gap-2">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Actualizar
            </button>
        </div>

        <!-- Filters (Year/Month structurue simulation) -->
        <div class="bg-slate-900 border border-white/10 p-6 rounded-2xl mb-8 flex gap-4">
            <select class="bg-slate-800 border border-white/10 text-white p-3 rounded-xl outline-none" id="year-filter">
                <option value="2026">2026</option>
            </select>
            <select class="bg-slate-800 border border-white/10 text-white p-3 rounded-xl outline-none"
                id="month-filter">
                <option value="02">Febrero (02)</option>
                <option value="03" disabled>Marzo (03)</option>
            </select>
            <div class="text-slate-500 text-sm align-middle flex items-center ml-4">
                Estructura de BD esperada: /pedidos/YYYY/MM/...
            </div>
        </div>

        <!-- Orders Table -->
        <div class="bg-slate-900 border border-white/10 rounded-2xl overflow-hidden">
            <table class="w-full text-left">
                <thead
                    class="bg-slate-950 text-slate-400 uppercase text-xs font-bold tracking-widest border-b border-white/5">
                    <tr>
                        <th class="p-4">ID Pedido / Proveedor</th>
                        <th class="p-4">Cliente</th>
                        <th class="p-4">Fecha</th>
                        <th class="p-4">Estado Pago</th>
                        <th class="p-4">Total</th>
                        <th class="p-4">Acciones</th>
                    </tr>
                </thead>
                <tbody class="text-sm font-medium" id="orders-tbody">
                    <!-- Example row -->
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="p-4">
                            <span class="text-indigo-400 font-mono">#ORD-98231</span><br>
                            <span
                                class="text-xs bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded-md mt-1 inline-block">CT
                                Internacional</span>
                        </td>
                        <td class="p-4">Juan Pérez<br><span class="text-xs text-slate-500">juan@example.com</span></td>
                        <td class="p-4 text-slate-400">25 Feb 2026</td>
                        <td class="p-4">
                            <span
                                class="bg-green-500/10 text-green-400 border border-green-500/20 px-3 py-1 rounded-full text-xs uppercase font-bold tracking-wider">Aprobado</span>
                        </td>
                        <td class="p-4 font-bold">$14,500.00 MXN</td>
                        <td class="p-4">
                            <button class="text-indigo-400 hover:text-white transition-colors" title="Ver detalle"><i
                                    data-lucide="eye" class="w-5 h-5"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="p-6 text-center text-slate-500 hidden" id="empty-orders">
                No hay pedidos en este periodo.
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
