<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastrear Mi Pedido | Pandishú</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <meta name="description" content="Consulta el estado de tu pedido Pandishú ingresando tu correo electrónico.">

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind + Lucide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#151e2e', 900: '#0f172a', 950: '#020617' },
                        brand: { cyan: '#0891b2', indigo: '#4f46e5' }
                    },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                }
            }
        }
    </script>

    <style>
        body {
            background: #020617;
        }

        .card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
        }

        /* Timeline */
        .timeline-step {
            position: relative;
            padding-left: 40px;
            padding-bottom: 28px;
        }

        .timeline-step:last-child {
            padding-bottom: 0;
        }

        .timeline-step::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 24px;
            bottom: 0;
            width: 2px;
            background: rgba(255, 255, 255, 0.08);
        }

        .timeline-step:last-child::before {
            display: none;
        }

        .step-dot {
            position: absolute;
            left: 8px;
            top: 4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .step-dot.done {
            background: #22c55e;
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }

        .step-dot.active {
            background: #6366f1;
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            animation: pulse 1.5s infinite;
        }

        .step-dot.pending {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.15);
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            }

            50% {
                box-shadow: 0 0 20px rgba(99, 102, 241, 0.8);
            }
        }

        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>

<body class="antialiased min-h-screen font-sans text-white">

    <!-- Navigation -->
    <nav class="sticky top-0 w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/5 py-3">
        <div class="max-w-5xl mx-auto flex justify-between items-center px-6">
            <a href="index" class="flex items-center gap-3">
                <img src="Pandishu-Logo-26.png" alt="Pandishú Logo"
                    class="h-9 w-9 rounded-xl object-cover ring-1 ring-white/10"
                    onerror="this.src='https://ui-avatars.com/api/?name=P&background=6366f1&color=fff'">
                <div class="flex flex-col leading-none">
                    <span class="text-lg font-black tracking-tight text-white uppercase italic">Pandishú</span>
                    <span class="text-[9px] text-indigo-400 font-bold tracking-[0.2em] uppercase">Tech Solutions</span>
                </div>
            </a>
            <div class="flex items-center gap-5 text-xs font-bold uppercase tracking-widest text-slate-400">
                <a href="tienda" class="hover:text-white transition flex items-center gap-1.5">
                    <i data-lucide="shopping-cart" class="w-4 h-4"></i> Tienda
                </a>
                <a href="https://wa.me/525662580512" target="_blank"
                    class="text-green-400 hover:text-green-300 transition flex items-center gap-1.5">
                    <i data-lucide="message-circle" class="w-4 h-4"></i> Soporte
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="py-16 px-6 text-center relative overflow-hidden">
        <div class="absolute inset-0 pointer-events-none">
            <div
                class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-indigo-600/10 rounded-full blur-[100px]">
            </div>
        </div>
        <div class="relative z-10 max-w-2xl mx-auto">
            <div
                class="inline-flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/20 rounded-full px-5 py-2 text-xs font-bold uppercase tracking-widest text-indigo-400 mb-6">
                <i data-lucide="package-search" class="w-3.5 h-3.5"></i>
                Rastreo de Pedidos
            </div>
            <h1 class="text-4xl md:text-5xl font-black tracking-tight uppercase italic mb-4 leading-none">
                ¿Dónde está<br><span class="gradient-text">mi pedido?</span>
            </h1>
            <p class="text-slate-400 text-lg font-light">
                Ingresa el correo con el que realizaste tu compra para consultar el estado.
            </p>
        </div>
    </header>

    <!-- Lookup Form -->
    <main class="max-w-2xl mx-auto px-6 pb-20">

        <!-- Search Card -->
        <div class="card p-8 mb-8">
            <div class="flex flex-col gap-4">
                <div
                    class="flex items-center bg-slate-950/60 border border-indigo-500/20 hover:border-indigo-400/40 rounded-2xl px-5 py-4 gap-4 transition-all group">
                    <i data-lucide="mail"
                        class="w-5 h-5 text-indigo-400 flex-shrink-0 group-focus-within:text-indigo-300 transition-colors"></i>
                    <input id="email-input" type="email" placeholder="tucorreo@ejemplo.com"
                        class="w-full bg-transparent text-white placeholder-slate-600 text-base font-medium outline-none"
                        onkeydown="if(event.key==='Enter') lookupOrders()">
                </div>
                <p id="error-msg"
                    class="hidden text-red-400 text-sm font-bold text-center flex items-center justify-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    <span id="error-text">No se encontraron pedidos.</span>
                </p>
                <button id="lookup-btn" onclick="lookupOrders()"
                    class="bg-indigo-600 hover:bg-indigo-500 text-white font-black text-sm py-4 rounded-2xl transition-all uppercase tracking-widest flex items-center justify-center gap-3 shadow-[0_4px_20px_rgba(79,70,229,0.3)]">
                    <i data-lucide="search" class="w-5 h-5"></i>
                    Consultar mis pedidos
                </button>
            </div>
        </div>

        <!-- Results (hidden until search) -->
        <div id="results-container" class="hidden flex flex-col gap-6">
            <h2 class="text-white font-black text-xl uppercase italic flex items-center gap-2">
                <i data-lucide="package" class="w-5 h-5 text-indigo-400"></i>
                Mis Pedidos
            </h2>
            <div id="orders-list"></div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 border-t border-slate-800 py-8 px-6">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <span class="text-slate-600 text-xs font-bold uppercase">© 2026 Pandishu E-Commerce</span>
            <a href="https://wa.me/525662580512?text=Hola%2C%20necesito%20ayuda%20con%20mi%20pedido" target="_blank"
                class="inline-flex items-center gap-2 bg-green-500/10 border border-green-500/25 hover:bg-green-500/20 text-green-400 font-bold text-xs px-5 py-2.5 rounded-full transition">
                <i data-lucide="message-circle" class="w-4 h-4"></i>
                ¿Necesitas ayuda? Escríbenos por WhatsApp
            </a>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        const API_BASE = 'https://us-central1-pandishu-web-1d860.cloudfunctions.net';

        function statusSteps(status) {
            const steps = [
                { key: 'received', label: 'Pedido Recibido', icon: 'check' },
                { key: 'paid', label: 'Pago Confirmado', icon: 'credit-card' },
                { key: 'processing', label: 'En Preparación en CT', icon: 'package' },
                { key: 'shipped', label: 'Enviado', icon: 'truck' }
            ];

            const progress = {
                'pending_payment': 0,
                'processing': 2,
                'paid': 3,
                'shipped': 4
            };

            const level = progress[status] ?? 0;

            return steps.map((step, i) => {
                const isDone = i < level;
                const isActive = i === level;
                const dotClass = isDone ? 'done' : (isActive ? 'active' : 'pending');
                const textColor = isDone ? 'text-green-400' : (isActive ? 'text-indigo-300' : 'text-slate-600');
                return `
                    <div class="timeline-step">
                        <div class="step-dot ${dotClass}">
                            ${isDone ? '<svg xmlns="http://www.w3.org/2000/svg" class="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
                        </div>
                        <p class="font-bold text-sm ${textColor}">${step.label}</p>
                    </div>
                `;
            }).join('');
        }

        function formatDate(ts) {
            if (!ts) return '—';
            const ms = ts._seconds ? ts._seconds * 1000 : ts;
            return new Date(ms).toLocaleDateString('es-MX', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatMoney(amount) {
            return '$' + Number(amount || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' MXN';
        }

        async function lookupOrders() {
            const email = document.getElementById('email-input').value.trim();
            const btn = document.getElementById('lookup-btn');
            const errorMsg = document.getElementById('error-msg');

            errorMsg.classList.add('hidden');
            document.getElementById('results-container').classList.add('hidden');

            if (!email || !email.includes('@')) {
                document.getElementById('error-text').textContent = 'Por favor ingresa un correo electrónico válido.';
                errorMsg.classList.remove('hidden');
                lucide.createIcons();
                return;
            }

            btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Buscando...`;
            btn.disabled = true;
            lucide.createIcons();

            try {
                const res = await fetch(`${API_BASE}/getOrderStatus`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (!res.ok || !data.orders || data.orders.length === 0) {
                    document.getElementById('error-text').textContent = data.error || 'No se encontraron pedidos para este correo.';
                    errorMsg.classList.remove('hidden');
                } else {
                    renderOrders(data.orders);
                }

            } catch (e) {
                document.getElementById('error-text').textContent = 'Error de conexión. Intenta de nuevo.';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerHTML = `<i data-lucide="search" class="w-5 h-5"></i> Consultar mis pedidos`;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        function renderOrders(orders) {
            const list = document.getElementById('orders-list');

            list.innerHTML = orders.map(order => {
                const itemsHtml = (order.items || []).map(item =>
                    `<li class="flex items-center gap-2 text-slate-300 text-sm">
                        <i data-lucide="package" class="w-3.5 h-3.5 text-slate-600 flex-shrink-0"></i>
                        <span class="font-semibold">${item.name || item.sku}</span>
                        <span class="text-slate-500">× ${item.quantity}</span>
                    </li>`
                ).join('');

                const ctHtml = (order.ctOrders || []).filter(c => c.pedidoWeb).map(ct =>
                    `<div class="flex items-center gap-2 text-xs">
                        <i data-lucide="truck" class="w-3.5 h-3.5 text-indigo-400"></i>
                        <span class="text-slate-400">Folio CT:</span>
                        <span class="text-indigo-300 font-mono font-bold">${ct.pedidoWeb}</span>
                    </div>`
                ).join('');

                return `
                <div class="card p-6 mb-4">
                    <div class="flex items-start justify-between gap-4 mb-5">
                        <div>
                            <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold mb-0.5">Pedido</p>
                            <p class="font-mono text-xs text-slate-300">#${order.orderId?.slice(-10) || '—'}</p>
                            <p class="text-slate-500 text-xs mt-1">${formatDate(order.createdAt)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold mb-1">Total</p>
                            <p class="text-xl font-black text-indigo-300">${formatMoney(order.amountTotal)}</p>
                        </div>
                    </div>

                    <div class="flex flex-col md:flex-row gap-8">
                        <!-- Timeline -->
                        <div class="flex-shrink-0">
                            <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold mb-4">Estado del Pedido</p>
                            <div>${statusSteps(order.status)}</div>
                        </div>

                        <!-- Items -->
                        <div class="flex-1">
                            <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold mb-3">Artículos</p>
                            <ul class="flex flex-col gap-2">${itemsHtml || '<li class="text-slate-600 text-sm">Sin detalle disponible</li>'}</ul>

                            ${ctHtml ? `<div class="mt-4 pt-4 border-t border-white/5 flex flex-col gap-2">${ctHtml}</div>` : ''}
                        </div>
                    </div>

                    <div class="mt-5 pt-5 border-t border-white/5">
                        <a href="https://wa.me/525662580512?text=Hola%2C%20necesito%20ayuda%20con%20mi%20pedido%20%23${order.orderId?.slice(-8)}"
                            target="_blank"
                            class="inline-flex items-center gap-2 text-green-400 hover:text-green-300 text-xs font-bold transition">
                            <i data-lucide="message-circle" class="w-4 h-4"></i>
                            Soporte por WhatsApp para este pedido
                        </a>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('results-container').classList.remove('hidden');
            lucide.createIcons();
        }
    </script>
</body>

</html>
